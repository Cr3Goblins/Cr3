<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CR3</title>

<style>

/* -------------------------
JETBRAINS FONT (LOCAL)
------------------------- */

@font-face {
    font-family: 'JetBrainsMono';
    src: url('/fonts/webfonts/JetBrainsMono-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
}

/* -------------------------
GLOBAL RESET
------------------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
font-family:'JetBrainsMono', monospace;
color:white;
overflow-x:hidden;
}

/* -------------------------
BACKGROUND
------------------------- */

body{

background-image:url("/images/background.png");
background-repeat:repeat;
background-size:auto;
background-position:top left;

display:flex;
align-items:center;
justify-content:center;
}

/* -------------------------
LAYOUT
------------------------- */

.container{

text-align:center;
padding:40px;

max-width:900px;
width:100%;
}

/* -------------------------
LOGO WRAPPER
Constrains sheen
------------------------- */

.logo-mask{

display:inline-block;
position:relative;

overflow:hidden;
}

/* -------------------------
LOGO IMAGE
------------------------- */

.logo{

width:clamp(220px,40vw,420px);
height:auto;

pointer-events:none;
user-select:none;

}

/* -------------------------
SHEEN EFFECT
------------------------- */

.logo-mask::after{

content:"";

position:absolute;

top:0;
left:-200%;

width:120%;
height:100%;

background:linear-gradient(
120deg,
rgba(255,255,255,0) 0%,
rgba(255,255,255,0.35) 50%,
rgba(255,255,255,0) 100%
);

transform:skewX(-25deg);

opacity:0;

}

/* sheen animation */

@keyframes sheen{

0%{
left:-200%;
opacity:0;
}

15%{
opacity:1;
}

50%{
left:200%;
opacity:0;
}

100%{
left:200%;
opacity:0;
}

}

/* run on hover */

.logo-mask:hover::after{

animation:sheen 1.1s ease;

}

/* run on page load */

.logo-mask.sheen-once::after{

animation:sheen 1.3s ease;

}

/* subtle periodic shimmer */

.logo-mask.sheen-idle::after{

animation:sheen 1.3s ease;

}

/* -------------------------
LINK SECTION
------------------------- */

.links{

margin-top:40px;

display:flex;
flex-wrap:wrap;

justify-content:center;
gap:16px;

}

/* link buttons */

.links a{

text-decoration:none;
color:white;

border:1px solid rgba(255,255,255,0.3);

padding:10px 18px;

border-radius:6px;

transition:all .25s ease;

}

.links a:hover{

background:rgba(255,255,255,0.1);

}

/* -------------------------
RESPONSIVE
------------------------- */

@media (max-width:600px){

.container{
padding:24px;
}

.links{
gap:10px;
}

}

</style>
</head>


<body>

<div class="container">

<div class="logo-mask sheen-once" id="logoMask">

<img
src="/images/logo.png"
class="logo"
draggable="false"
alt="CR3 Logo"
/>

</div>


<div class="links">

<a href="https://github.com/Cr3Goblins">GitHub</a>

<a href="https://cr3.shop">Shop</a>

<a href="https://cr3labs.com">Labs</a>

</div>

</div>


<script>

/* disable right click */

document.addEventListener("contextmenu", e => e.preventDefault());

/* idle shimmer */

const logoMask = document.getElementById("logoMask");

function randomSheen(){

const delay = 10000 + Math.random()*6000;

setTimeout(()=>{

logoMask.classList.add("sheen-idle");

setTimeout(()=>{
logoMask.classList.remove("sheen-idle");
randomSheen();
},1500);

},delay);

}

randomSheen();

</script>

</body>
</html>
