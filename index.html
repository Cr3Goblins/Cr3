<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cr3 Tools - Coming Soon</title>
    <style>
        /* JetBrains Mono – self-hosted */
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('https://raw.githubusercontent.com/Cr3Goblins/Cr3/refs/heads/main/fonts/webfonts/JetBrainsMono-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'JetBrains Mono';
            src: url('fonts/JetBrainsMono-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'JetBrains Mono';
            src: url('fonts/JetBrainsMono-ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }

        /* Basic reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        /* Page layout and background */
        body {
            font-family: 'JetBrains Mono', monospace, sans-serif;
            background: #000 url('https://raw.githubusercontent.com/Cr3Goblins/Cr3/refs/heads/main/backgrounds/BG2.png') center / cover fixed no-repeat;
            color: #e0e0e0;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 3.75rem;
            padding: 3rem 1.5rem;
            text-align: center;
            line-height: 1.5;
        }

        /* Logo container (now as background) */
        .logo-area {
            animation: fadeIn 1.5s ease-out;
            width: 360px;
            height: 360px; /* Adjust based on your logo's aspect ratio */
            margin: 0 auto;
            background: url('https://raw.githubusercontent.com/Cr3Goblins/Cr3/refs/heads/main/Logos/CR3%20Logo2026.webp') center / contain no-repeat;
            pointer-events: none;
            filter: drop-shadow(0 0 18px rgba(230, 19, 22, 0.6));
        }

        /* Main link stack */
        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
            margin: auto;
        }

        /* Button-style links */
        .link-box {
            width: 100%;
            max-width: 510px;
            padding: 1.8rem;
            border-radius: 15px;
            background-color: #282828;
            color: #fff;
            text-decoration: none;
            font-size: 1.95rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 22.5px rgba(0,0,0,0.5);
        }

        /* Light swipe effect on hover */
        .link-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .link-box:hover::before {
            left: 100%;
        }

        .link-box:hover {
            transform: translateY(-9px);
            box-shadow: 0 12px 37.5px rgba(230,19,22,0.3);
        }

        /* Individual button colors */
        .link-box:nth-child(1) { background-color: #e61316; }
        .link-box:nth-child(2) { background-color: #d01114; }
        .link-box:nth-child(3) { background-color: #b00e12; }
        .link-box:nth-child(4) { background-color: #9c0357; }

        /* Footer notice */
        .construction-notice {
            font-size: 1.95rem;
            font-weight: 500;
            padding: 2.1rem 3rem;
            background: rgba(20,20,20,0.8);
            border-radius: 15px;
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(230,19,22,0.25);
            max-width: 1020px;
            margin: 0 auto 2.25rem;
            animation: subtlePulse 2s infinite alternate ease-in-out;
        }

        .construction-notice strong {
            color: #ff4757;
            font-weight: 800;
        }

        /* Honor reduced motion preferences */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        /* Small screen adjustments */
        @media (max-width: 720px) {
            body {
                padding: 1.8rem 1.2rem;
                gap: 3rem;
            }

            .logo-area {
                width: 300px;
                height: 300px;
            }

            .link-box {
                font-size: 1.65rem;
                padding: 1.5rem;
            }

            .construction-notice {
                font-size: 1.65rem;
                padding: 1.8rem 2.25rem;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(37.5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes subtlePulse {
            from { box-shadow: 0 0 12px rgba(230,19,22,0.2); }
            to { box-shadow: 0 0 24px rgba(230,19,22,0.4); }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <header class="logo-area" role="banner" aria-label="Cr3 Tools Logo"></header>

    <main class="links-container" role="main">
        <a href="https://cr3tools.bigcartel.com/" class="link-box">Big Cartel</a>
        <a href="pages/contact.html" class="link-box">Contact Form</a>
        <a href="https://www.instagram.com/cr3tools" class="link-box">Instagram: @cr3tools</a>
        <a href="https://www.instagram.com/420greengoblins" class="link-box">Instagram: Personal</a>
    </main>

    <footer class="construction-notice" role="contentinfo">
        <strong>Site Under Construction</strong><br>
        Full website coming soon<br>
        <strong>DM us on our personal Instagram for tools</strong>
    </footer>

    <script>
        // Optional: Alert on right-click attempt (remove if annoying)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            // alert('Right-click is disabled on this site.');
        });
    </script>
</body>
</html>
