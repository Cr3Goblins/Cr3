/* =====================
JETBRAINS MONO
===================== */

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
font-weight:400;
font-style:normal;
font-display:swap;
}

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Bold.woff2") format("woff2");
font-weight:700;
font-style:normal;
font-display:swap;
}

/* =====================
BASE
===================== */

:root{
--accent-primary:#e61316;
--accent-secondary:#9c0357;
--bg-dark:#000;
--text-light:#e0e0e0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* =====================
BODY
===================== */

body{

min-height:100vh;

font-family:"JetBrains Mono", monospace;

color:var(--text-light);

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

padding:clamp(1rem,3vw,3rem);

text-align:center;
line-height:1.5;

background-color:#000;

/* FIXED PATH */

background-image:url("./backgrounds/TBG.webp");

background-position:center;
background-size:cover;
background-repeat:no-repeat;

}

/* =====================
LOGO AREA
===================== */

.logo-wrap{
display:flex;
justify-content:center;
align-items:center;
}

/* =====================
LOGO
===================== */

.logo{

width:clamp(180px,35vw,360px);

filter:drop-shadow(0 0 18px rgba(230,19,22,.6));

user-select:none;
-webkit-user-drag:none;

}

/* =====================
LINKS
===================== */

.links{

width:100%;
max-width:600px;

display:flex;
flex-direction:column;
gap:1.2rem;

}

/* =====================
BUTTON
===================== */

.link{

padding:1rem 1.6rem;

border-radius:14px;

text-decoration:none;

color:white;

font-size:clamp(1rem,2.5vw,1.4rem);

font-weight:700;

background:rgba(230,19,22,.85);

border:1px solid rgba(255,255,255,.1);

transition:transform .25s ease, box-shadow .25s ease;

}

.link.secondary{
background:rgba(156,3,87,.9);
}

.link:hover{

transform:translateY(-4px);

box-shadow:
0 10px 30px rgba(0,0,0,.6),
0 0 25px rgba(230,19,22,.5);

}

/* =====================
NOTICE
===================== */

.notice{

font-size:clamp(.9rem,2vw,1.2rem);

padding:1.4rem;

background:rgba(20,20,20,.75);

border-radius:14px;

border:1px solid rgba(230,19,22,.25);

max-width:700px;

}

.notice strong{
color:#ff4757;
}

</style>

</head>
