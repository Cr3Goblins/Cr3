<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Cr3 Tools - High-quality tools coming soon. Check our shop, contact us, or follow on Instagram.">

<title>Cr3 Tools — Coming Soon</title>

<link rel="preload" href="/fonts/webfonts/JetBrainsMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/logos/cr3-logo2026.webp" as="image">

<style>

/* =====================
FONTS
===================== */

@font-face{
font-family:"JetBrains Mono";
src:url("/fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
font-weight:400;
font-style:normal;
font-display:swap;
}

@font-face{
font-family:"JetBrains Mono";
src:url("/fonts/webfonts/JetBrainsMono-Bold.woff2") format("woff2");
font-weight:700;
font-style:normal;
font-display:swap;
}

/* =====================
ROOT VARIABLES
===================== */

:root{

--accent-primary:#e61316;
--accent-secondary:#9c0357;

--bg-dark:#000;
--text-light:#e0e0e0;

}

/* =====================
RESET
===================== */

*,
*::before,
*::after{

margin:0;
padding:0;
box-sizing:border-box;

}

/* =====================
BODY
===================== */

body{

min-height:100vh;

font-family:"JetBrains Mono", monospace;

color:var(--text-light);

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

padding:clamp(1rem,3vw,3rem);

text-align:center;
line-height:1.5;

background-color:var(--bg-dark);
background-image:url("/backgrounds/TBG.webp");
background-position:center;
background-size:cover;
background-repeat:no-repeat;

}

/* dark overlay */

body::before{

content:"";
position:fixed;
inset:0;

background:rgba(0,0,0,.55);

pointer-events:none;

}

/* =====================
LOGO AREA
===================== */

.logo-wrap{

position:relative;
display:flex;
justify-content:center;
align-items:center;

}

/* glow backdrop */

.logo-wrap::before{

content:"";

position:absolute;

width:420px;
height:420px;

background:
radial-gradient(
circle,
rgba(230,19,22,.35) 0%,
rgba(156,3,87,.25) 40%,
transparent 70%
);

filter:blur(60px);

opacity:.9;

z-index:-1;

}

/* =====================
LOGO
===================== */

.logo{

width:clamp(180px,35vw,360px);

filter:drop-shadow(0 0 18px rgba(230,19,22,.6));

user-select:none;
-webkit-user-drag:none;

}

/* =====================
LINKS
===================== */

.links{

width:100%;
max-width:600px;

display:flex;
flex-direction:column;

gap:clamp(1rem,2vw,1.6rem);

}

/* =====================
BUTTONS
===================== */

.link{

padding:clamp(1rem,2vw,1.6rem);

border-radius:14px;

text-decoration:none;

color:white;

font-size:clamp(1rem,2.4vw,1.4rem);

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

background:var(--accent-primary);

border:1px solid rgba(255,255,255,.1);

box-shadow:0 6px 18px rgba(0,0,0,.5);

transition:
transform .2s ease,
box-shadow .2s ease;

}

/* alternate button */

.link.secondary{

background:var(--accent-secondary);

}

/* hover */

.link:hover{

transform:translateY(-4px);

box-shadow:
0 14px 30px rgba(0,0,0,.6),
0 0 20px rgba(230,19,22,.45);

}

/* focus accessibility */

.link:focus-visible{

outline:3px solid white;
outline-offset:4px;

}

/* =====================
NOTICE
===================== */

.notice{

font-size:clamp(.9rem,2vw,1.3rem);

padding:clamp(1rem,2vw,2rem);

background:rgba(20,20,20,.75);

border-radius:14px;

border:1px solid rgba(230,19,22,.25);

backdrop-filter:blur(10px);

max-width:700px;

}

.notice strong{

color:#ff4757;

}

/* =====================
REDUCED MOTION
===================== */

@media (prefers-reduced-motion: reduce){

*{
transition:none !important;
}

}

</style>

</head>

<body>

<header class="logo-wrap">

<img
src="/logos/cr3-logo2026.webp"
alt="Cr3 Tools Logo"
class="logo"
id="logo"
draggable="false"
loading="lazy"
>

</header>

<main>

<nav class="links">

<a href="https://cr3tools.bigcartel.com/" class="link" rel="noopener">
Shop Tools
</a>

<a href="/pages/contact.html" class="link">
Contact
</a>

<a href="https://www.instagram.com/cr3tools" class="link" rel="noopener">
Instagram — @cr3tools
</a>

<a href="https://www.instagram.com/420greengoblins" class="link secondary" rel="noopener">
Instagram — Personal
</a>

</nav>

</main>

<footer class="notice">

<strong>Site Under Construction</strong><br>
Full website coming soon<br>
<strong>DM us on our personal Instagram for tools</strong>

</footer>

<script>

/* logo protection */

const logo=document.getElementById("logo");

if(logo){

logo.addEventListener("contextmenu",e=>e.preventDefault());
logo.addEventListener("dragstart",e=>e.preventDefault());

}

</script>

</body>

</html>
