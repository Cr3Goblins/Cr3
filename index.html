<style>

/* -----------------------------
JETBRAINS MONO (local GitHub)
----------------------------- */

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
font-weight:400;
font-style:normal;
font-display:swap;
}

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Bold.woff2") format("woff2");
font-weight:700;
font-style:normal;
font-display:swap;
}

/* -----------------------------
ROOT COLORS
----------------------------- */

:root{
--accent-primary:#e61316;
--accent-secondary:#9c0357;
--bg-dark:#000;
--text-light:#e0e0e0;
}

/* -----------------------------
RESET
----------------------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* -----------------------------
BODY
----------------------------- */

body{

min-height:100vh;

font-family:"JetBrains Mono", monospace;
color:var(--text-light);

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

padding:clamp(1.2rem,3vw,3rem);

text-align:center;
line-height:1.5;

background-color:#000;

/* seamless repeating background */

background-image:url("./backgrounds/TBG.webp");
background-repeat:repeat;
background-position:center;
background-size:auto;

}

/* -----------------------------
LOGO AREA
----------------------------- */

.logo-wrap{
display:flex;
justify-content:center;
align-items:center;
margin-top:clamp(10px,3vh,40px);
}

/* wrapper for sheen effect */

.logo-wrapper{
position:relative;
display:inline-block;
}

/* -----------------------------
LOGO
----------------------------- */

.logo{

width:clamp(200px,35vw,380px);
height:auto;

filter:drop-shadow(0 0 18px rgba(230,19,22,.6));

user-select:none;
-webkit-user-drag:none;

display:block;

}

/* -----------------------------
CANDY SHEEN EFFECT
----------------------------- */

.logo-wrapper::after{

content:"";
position:absolute;

top:0;
left:-150%;

width:80%;
height:100%;

background:linear-gradient(
110deg,
rgba(255,255,255,0) 0%,
rgba(255,255,255,0.35) 45%,
rgba(255,255,255,0.65) 50%,
rgba(255,255,255,0.35) 55%,
rgba(255,255,255,0) 100%
);

transform:skewX(-20deg);

animation:sheenMove 6s infinite;

pointer-events:none;

}

@keyframes sheenMove{

0%{
left:-150%;
}

60%{
left:160%;
}

100%{
left:160%;
}

}

/* -----------------------------
LINK SECTION
----------------------------- */

.links{

width:100%;
max-width:600px;

display:flex;
flex-direction:column;

gap:1.2rem;

margin-top:clamp(30px,5vh,60px);

}

/* -----------------------------
BUTTON STYLE
----------------------------- */

.link{

padding:1rem 1.6rem;

border-radius:14px;

text-decoration:none;

color:white;

font-size:clamp(1rem,2.5vw,1.4rem);

font-weight:700;

background:rgba(230,19,22,.9);

border:1px solid rgba(255,255,255,.1);

transition:
transform .25s ease,
box-shadow .25s ease,
background .25s ease;

}

/* secondary button */

.link.secondary{
background:rgba(156,3,87,.9);
}

/* hover */

.link:hover{

transform:translateY(-4px);

box-shadow:
0 10px 30px rgba(0,0,0,.6),
0 0 25px rgba(230,19,22,.5);

}

/* -----------------------------
FOOTER NOTICE
----------------------------- */

.notice{

font-size:clamp(.9rem,2vw,1.2rem);

padding:1.4rem;

background:rgba(20,20,20,.65);

border-radius:14px;

border:1px solid rgba(230,19,22,.25);

max-width:700px;

margin-top:clamp(40px,6vh,70px);

}

.notice strong{
color:#ff4757;
}

</style>

</head>

</nav>

</body>

</html>
