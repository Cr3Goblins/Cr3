<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Cr3 Tools - High-quality tools coming soon.">

<title>Cr3 Tools — Coming Soon</title>

<link rel="preload" as="image" href="./Logos/CR3%20Logo2026.webp">

<style>

/* =====================
SELF-HOSTED FONTS
===================== */
@font-face {
    font-family: "JetBrains Mono";
    src: url("./fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: "JetBrains Mono";
    src: url("./fonts/webfonts/JetBrainsMono-Bold.woff2") format("woff2");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
}

/* =====================
ROOT VARIABLES
===================== */
:root {
    --accent-primary: #e61316;
    --accent-secondary: #9c0357;
    --bg-dark: #000;
    --text-light: #e0e0e0;
}

/* =====================
RESET
===================== */
*,
*::before,
*::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =====================
BODY
===================== */
body {
    min-height: 100vh;
    font-family: "JetBrains Mono", monospace;
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: clamp(1rem, 3vw, 3rem);
    text-align: center;
    line-height: 1.5;

    /* Seamless tiled background */
    background-color: var(--bg-dark);
    background-image: url("./backgrounds/TBG.webp");
    background-repeat: repeat;
    background-position: top left;
    background-size: auto;

    animation: pageEnter 1s ease;
}

/* =====================
PAGE ENTER ANIMATION
===================== */
@keyframes pageEnter {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* =====================
LOGO AREA
===================== */
.logo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: clamp(2rem, 5vw, 4rem);
}

/* Logo styling */
.logo {
    width: clamp(180px, 35vw, 360px);
    filter: drop-shadow(0 0 24px rgba(230,19,22,.8));
    user-select: none;
    -webkit-user-drag: none;
}

/* =====================
LINKS
===================== */
.links {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: clamp(1rem, 2vw, 1.8rem);
}

/* Buttons */
.link {
    padding: clamp(0.9rem, 1.8vw, 1.6rem) clamp(1.5rem, 3vw, 2.2rem);
    border-radius: 14px;
    text-decoration: none;
    color: #fff;
    font-size: clamp(1rem, 2.2vw, 1.5rem);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent-primary);
    border: 1px solid rgba(255,255,255,.1);
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
    transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
}

.link.secondary {
    background: var(--accent-secondary);
}

.link:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(0,0,0,.6), 0 0 20px rgba(230,19,22,.5);
}

.link:focus-visible {
    outline: 3px solid white;
    outline-offset: 4px;
}

/* =====================
NOTICE FOOTER
===================== */
.notice {
    font-size: clamp(.9rem, 2vw, 1.4rem);
    padding: clamp(1rem, 2vw, 2rem);
    background: rgba(20,20,20,.75);
    border-radius: 14px;
    border: 1px solid rgba(230,19,22,.25);
    max-width: 700px;
    line-height: 1.4;
}

.notice strong {
    color: #ff4757;
}

/* =====================
REDUCED MOTION (ACCESSIBILITY)
===================== */
@media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
}

/* =====================
RESPONSIVE TWEAKS
===================== */
@media (max-width: 480px) {
    body { padding: 1.2rem; }
    .links a { font-size: 1rem; padding: 0.8rem 1.5rem; }
    .notice { font-size: 1rem; padding: 1rem; }
}

</style>

</head>

<body>

<header class="logo-wrap">
    <img src="./Logos/CR3%20Logo2026.webp" alt="Cr3 Tools Logo" class="logo" id="logo" draggable="false">
</header>

<main>
    <nav class="links">
        <a href="https://cr3tools.bigcartel.com/" class="link">Big Cartel</a>
        <a href="./pages/contact.html" class="link">Contact Form</a>
        <a href="https://www.instagram.com/cr3tools" class="link">Instagram — @cr3tools</a>
        <a href="https://www.instagram.com/420greengoblins" class="link secondary">Instagram — Personal</a>
    </nav>
</main>

<footer class="notice">
    <strong>Site Under Construction</strong><br>
    Full website coming soon<br>
    <strong>DM us on our personal Instagram for tools</strong>
</footer>

</body>
</html>
