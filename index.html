<style>

/* -----------------------------
JETBRAINS MONO
----------------------------- */

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
font-weight:400;
font-style:normal;
font-display:swap;
}

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Bold.woff2") format("woff2");
font-weight:700;
font-style:normal;
font-display:swap;
}

/* ----------------------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

font-family:"JetBrains Mono", monospace;
color:#e0e0e0;

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

padding:clamp(1.2rem,3vw,3rem);

text-align:center;
line-height:1.5;

background-color:#000;

background-image:url("./backgrounds/TBG.webp");
background-repeat:repeat;
background-position:center;
background-size:auto;

}

/* -----------------------------
LOGO
----------------------------- */

.logo-wrap{
margin-top:clamp(10px,3vh,40px);
}

.logo-wrapper{

position:relative;
display:inline-block;

overflow:hidden; /* keeps sheen inside logo */

}

.logo{

width:clamp(200px,35vw,380px);
height:auto;
display:block;

filter:drop-shadow(0 0 18px rgba(230,19,22,.6));

/* candy coat gloss */

background:linear-gradient(
to bottom,
rgba(255,255,255,.10),
rgba(255,255,255,0) 40%
);

}

/* -----------------------------
SHEEN
----------------------------- */

.logo-wrapper::after{

content:"";
position:absolute;

top:0;
left:-130%;

width:120%;
height:100%;

background:linear-gradient(
110deg,
rgba(255,255,255,0) 0%,
rgba(255,255,255,0.35) 45%,
rgba(255,255,255,0.65) 50%,
rgba(255,255,255,0.35) 55%,
rgba(255,255,255,0) 100%
);

transform:skewX(-20deg);
pointer-events:none;

animation:sheenMove 1.6s ease-out 1;

}

.logo-wrapper:hover::after{
animation:sheenMove 1.6s ease-out 1;
}

@keyframes sheenMove{

0%{
left:-130%;
}

100%{
left:130%;
}

}

/* -----------------------------
LINKS
----------------------------- */

.links{

width:100%;
max-width:600px;

display:flex;
flex-direction:column;
gap:1.2rem;

margin-top:clamp(30px,5vh,60px);

}

.link{

padding:1rem 1.6rem;
border-radius:14px;

text-decoration:none;
color:white;

font-size:clamp(1rem,2.5vw,1.4rem);
font-weight:700;

background:#e61316;

border:1px solid rgba(255,255,255,.1);

transition:
transform .25s ease,
box-shadow .25s ease;

}

.link.secondary{
background:#9c0357;
}

.link:hover{

transform:translateY(-4px);

box-shadow:
0 10px 30px rgba(0,0,0,.6),
0 0 25px rgba(230,19,22,.5);

}

/* -----------------------------
FOOTER
----------------------------- */

.notice{

font-size:clamp(.9rem,2vw,1.2rem);

padding:1.4rem;

background:rgba(20,20,20,.65);

border-radius:14px;

border:1px solid rgba(230,19,22,.25);

max-width:700px;

margin-top:clamp(40px,6vh,70px);

}

.notice strong{
color:#ff4757;
}

</style>
