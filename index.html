<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CR3</title>

<style>

/* ------------------------- */
/* LOCAL JETBRAINS FONT */
/* ------------------------- */

@font-face{
font-family:"JetBrainsMono";
src:url("/fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
font-weight:normal;
font-style:normal;
}

/* ------------------------- */
/* GLOBAL RESET */
/* ------------------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
font-family:"JetBrainsMono",monospace;
color:white;
overflow-x:hidden;
}

/* ------------------------- */
/* BACKGROUND */
/* ------------------------- */

body{

background-image:url("/images/background.png");
background-repeat:repeat;
background-size:auto;

animation:bgDrift 120s linear infinite;

display:flex;
align-items:center;
justify-content:center;

}

/* slow parallax drift */

@keyframes bgDrift{

0%{background-position:0 0;}
50%{background-position:120px 60px;}
100%{background-position:0 0;}

}

/* ------------------------- */
/* CRT OVERLAY */
/* ------------------------- */

body::before{

content:"";

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.02) 0px,
rgba(255,255,255,0.02) 1px,
transparent 1px,
transparent 3px
);

z-index:2;

}

/* ------------------------- */
/* LAYOUT */
/* ------------------------- */

.container{

text-align:center;
padding:40px;

max-width:900px;
width:100%;

position:relative;
z-index:3;

}

/* ------------------------- */
/* LOGO WRAPPER */
/* ------------------------- */

.logo-mask{

display:inline-block;
position:relative;

overflow:hidden;

}

/* ambient glow */

.logo-mask::before{

content:"";

position:absolute;

top:50%;
left:50%;

width:120%;
height:120%;

transform:translate(-50%,-50%);

background:radial-gradient(
circle,
rgba(255,255,255,0.15),
rgba(255,255,255,0) 70%
);

animation:glowPulse 5s ease-in-out infinite;

z-index:-1;

}

/* glow pulse */

@keyframes glowPulse{

0%{opacity:.2;}
50%{opacity:.45;}
100%{opacity:.2;}

}

/* ------------------------- */
/* LOGO */
/* ------------------------- */

.logo{

width:clamp(220px,40vw,420px);
height:auto;

pointer-events:none;
user-select:none;

}

/* ------------------------- */
/* SHEEN EFFECT */
/* ------------------------- */

.logo-mask::after{

content:"";

position:absolute;

top:0;
left:-200%;

width:120%;
height:100%;

background:linear-gradient(
120deg,
rgba(255,255,255,0) 0%,
rgba(255,255,255,0.35) 50%,
rgba(255,255,255,0) 100%
);

transform:skewX(-25deg);

opacity:0;

}

/* sheen animation */

@keyframes sheen{

0%{
left:-200%;
opacity:0;
}

15%{
opacity:1;
}

50%{
left:200%;
opacity:0;
}

100%{
left:200%;
opacity:0;
}

}

/* hover trigger */

.logo-mask:hover::after{
animation:sheen 1.1s ease;
}

/* load trigger */

.logo-mask.sheen-once::after{
animation:sheen 1.3s ease;
}

/* idle trigger */

.logo-mask.sheen-idle::after{
animation:sheen 1.3s ease;
}

/* ------------------------- */
/* LINKS */
/* ------------------------- */

.links{

margin-top:42px;

display:flex;
flex-wrap:wrap;

justify-content:center;
gap:16px;

}

/* buttons */

.links a{

text-decoration:none;
color:white;

border:1px solid rgba(255,255,255,0.35);

padding:10px 18px;

border-radius:6px;

transition:all .25s ease;

}

.links a:hover{

background:rgba(255,255,255,0.12);
border-color:white;

}

/* ------------------------- */
/* MOBILE */
/* ------------------------- */

@media(max-width:600px){

.container{
padding:24px;
}

.links{
gap:10px;
}

}

</style>

</head>


<body>

<div class="container">

<div class="logo-mask sheen-once" id="logoMask">

<img
src="/images/logo.png"
class="logo"
alt="CR3 Logo"
draggable="false"
>

</div>


<div class="links">

<a href="https://github.com/Cr3Goblins">GitHub</a>

<a href="https://cr3.shop">Shop</a>

<a href="https://cr3labs.com">Labs</a>

</div>

</div>


<script>

/* disable right click */

document.addEventListener("contextmenu",e=>e.preventDefault());

/* idle sheen */

const logoMask=document.getElementById("logoMask");

function idleSheen(){

const delay=10000+Math.random()*6000;

setTimeout(()=>{

logoMask.classList.add("sheen-idle");

setTimeout(()=>{
logoMask.classList.remove("sheen-idle");
idleSheen();
},1500);

},delay);

}

idleSheen();

</script>

</body>

</html>
