<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cr3 Tools — Coming Soon</title>

<style>
:root {
    --accent-1: #e61316;
    --accent-2: #e61316;
    --accent-3: #e61316;
    --accent-4: #9c0357;
    --bg-dark: #000;
    --text-light: #e0e0e0;
}

@font-face {
    font-family: "JetBrains Mono";
    src: url("https://raw.githubusercontent.com/Cr3Goblins/Cr3/refs/heads/main/fonts/webfonts/JetBrainsMono-Medium.woff2") format("woff2");
    font-weight: 500;
    font-display: swap;
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100dvh;
    font-family: "JetBrains Mono", monospace;
    background: var(--bg-dark) url("https://raw.githubusercontent.com/Cr3Goblins/Cr3/refs/heads/main/backgrounds/BGwp.webp") center / cover no-repeat;
    color: var(--text-light);

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;

    padding: clamp(1rem, 3vw, 3rem);
    text-align: center;
    line-height: 1.5;
}

/* Logo */
.logo {
    width: clamp(180px, 35vw, 360px);
    height: auto;
    filter: drop-shadow(0 0 18px rgba(230,19,22,0.6));

    user-select: none;
    -webkit-user-drag: none;
    pointer-events: auto;
}

/* Links */
.links {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: clamp(1rem, 2vw, 1.8rem);
}

.link {
    padding: clamp(1rem, 2vw, 1.8rem);
    border-radius: 14px;
    text-decoration: none;
    color: #fff;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform .25s ease, box-shadow .25s ease;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
}

.link:nth-child(1) { background: var(--accent-1); }
.link:nth-child(2) { background: var(--accent-2); }
.link:nth-child(3) { background: var(--accent-3); }
.link:nth-child(4) { background: var(--accent-4); }

.link:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(230,19,22,.3);
}

.notice {
    font-size: clamp(.9rem, 2vw, 1.4rem);
    padding: clamp(1rem, 2vw, 2rem);
    background: rgba(20,20,20,.8);
    border-radius: 14px;
    border: 1px solid rgba(230,19,22,.25);
    backdrop-filter: blur(10px);
    max-width: 700px;
}

.notice strong {
    color: #ff4757;
}

@media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
}
</style>
</head>

<body>

<header>
    <img 
        src="https://raw.githubusercontent.com/Cr3Goblins/Cr3/refs/heads/main/Logos/CR3%20Logo2026.webp" 
        alt="Cr3 Tools Logo"
        class="logo"
        draggable="false"
        id="logo">
</header>

<main class="links">
    <a href="https://cr3tools.bigcartel.com/" class="link">Big Cartel</a>
    <a href="pages/contact.html" class="link">Contact Form</a>
    <a href="https://www.instagram.com/cr3tools" class="link">Instagram — @cr3tools</a>
    <a href="https://www.instagram.com/420greengoblins" class="link">Instagram — Personal</a>
</main>

<footer class="notice">
    <strong>Site Under Construction</strong><br>
    Full website coming soon<br>
    <strong>DM us on our personal Instagram for tools</strong>
</footer>

<script>
const logo = document.getElementById("logo");


logo.addEventListener("contextmenu", e => e.preventDefault());


logo.addEventListener("dragstart", e => e.preventDefault());
</script>

</body>
</html>
