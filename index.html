<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CR3 Tools — Coming Soon</title>
<meta name="description" content="CR3 Tools - High quality tools coming soon">

<style>

/* -------------------------
JETBRAINS MONO
------------------------- */

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Regular.woff2") format("woff2");
font-weight:400;
font-style:normal;
font-display:swap;
}

@font-face{
font-family:"JetBrains Mono";
src:url("./fonts/webfonts/JetBrainsMono-Bold.woff2") format("woff2");
font-weight:700;
font-style:normal;
font-display:swap;
}

/* -------------------------
RESET
------------------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* -------------------------
BODY
------------------------- */

body{

min-height:100vh;

font-family:"JetBrains Mono", monospace;
color:#e0e0e0;

display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;

padding:clamp(1rem,3vw,3rem);

background:#000;

background-image:url("./backgrounds/TBG.webp");
background-repeat:repeat;

background-position:center;

text-align:center;

transition:background-position .2s linear;

}

/* -------------------------
LOGO AREA
------------------------- */

.logo-wrap{
margin-top:clamp(10px,3vh,40px);
}

.logo-box{

position:relative;
display:inline-block;

width:clamp(200px,35vw,380px);

}

/* -------------------------
LOGO
------------------------- */

.logo{

width:100%;
display:block;

pointer-events:none;
user-select:none;
-webkit-user-drag:none;

filter:
drop-shadow(0 0 18px rgba(230,19,22,.55))
drop-shadow(0 8px 18px rgba(0,0,0,.55));

transition:filter .2s ease;

}

/* -------------------------
MASK LAYER
------------------------- */

.logo-mask{

position:absolute;
inset:0;

-webkit-mask-image:url("./Logos/CR3 Logo2026.webp");
-webkit-mask-size:contain;
-webkit-mask-repeat:no-repeat;
-webkit-mask-position:center;

mask-image:url("./Logos/CR3 Logo2026.webp");
mask-size:contain;
mask-repeat:no-repeat;
mask-position:center;

pointer-events:none;

}

/* -------------------------
ENAMEL GLOSS
------------------------- */

.logo-gloss{

position:absolute;
inset:0;

background:linear-gradient(
to bottom,
rgba(255,255,255,.28) 0%,
rgba(255,255,255,.15) 12%,
rgba(255,255,255,.05) 22%,
rgba(255,255,255,0) 40%
);

}

/* -------------------------
SHEEN SWEEP
------------------------- */

.logo-sheen{

position:absolute;

top:0;
bottom:0;

width:35%;

background:linear-gradient(
110deg,
rgba(255,255,255,0) 0%,
rgba(255,255,255,.4) 40%,
rgba(255,255,255,.95) 50%,
rgba(255,255,255,.4) 60%,
rgba(255,255,255,0) 100%
);

transform:translateX(-150%) skewX(-20deg);

animation:sheenMove 1.2s ease-out 1;

}

.logo-box:hover .logo-sheen{
animation:sheenMove 1.2s ease-out 1;
}

@keyframes sheenMove{

0%{
transform:translateX(-150%) skewX(-20deg);
}

100%{
transform:translateX(260%) skewX(-20deg);
}

}

/* -------------------------
LINKS
------------------------- */

.links{

width:100%;
max-width:600px;

display:flex;
flex-direction:column;

gap:1.2rem;

margin-top:clamp(30px,5vh,60px);

}

.link{

padding:1rem 1.6rem;
border-radius:14px;

text-decoration:none;
color:white;

font-size:clamp(1rem,2.5vw,1.4rem);
font-weight:700;

background:#e61316;

border:1px solid rgba(255,255,255,.1);

transition:transform .25s ease, box-shadow .25s ease;

}

.link.secondary{
background:#9c0357;
}

.link:hover{

transform:translateY(-4px);

box-shadow:
0 10px 30px rgba(0,0,0,.6),
0 0 25px rgba(230,19,22,.5);

}

/* -------------------------
FOOTER
------------------------- */

.notice{

font-size:clamp(.9rem,2vw,1.2rem);

padding:1.4rem;

background:rgba(20,20,20,.65);

border-radius:14px;

border:1px solid rgba(230,19,22,.25);

max-width:700px;

margin-top:clamp(40px,6vh,70px);

}

.notice strong{
color:#ff4757;
}

</style>

</head>

<body>

<header class="logo-wrap">

<div class="logo-box">

<img
src="./Logos/CR3 Logo2026.webp"
class="logo"
alt="CR3 Tools Logo"
draggable="false">

<div class="logo-mask">

<div class="logo-gloss"></div>

<div class="logo-sheen"></div>

</div>

</div>

</header>

<main>

<nav class="links">

<a href="https://cr3tools.bigcartel.com/" class="link">
Big Cartel
</a>

<a href="./pages/contact.html" class="link">
Contact Form
</a>

<a href="https://www.instagram.com/cr3tools" class="link">
Instagram — @cr3tools
</a>

<a href="https://www.instagram.com/420greengoblins" class="link secondary">
Instagram — Personal
</a>

</nav>

</main>

<footer class="notice">

<strong>Site Under Construction</strong><br>
Full website coming soon<br>
<strong>DM us on our personal Instagram for tools</strong>

</footer>

<script>

/* disable right click */

document.querySelector(".logo-box")
.addEventListener("contextmenu", e => e.preventDefault());

/* subtle parallax */

document.addEventListener("mousemove", e => {

const x = (e.clientX / window.innerWidth - .5) * 20;
const y = (e.clientY / window.innerHeight - .5) * 20;

document.body.style.backgroundPosition = `${50+x}% ${50+y}%`;

});

</script>

</body>

</html>
